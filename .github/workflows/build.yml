name: Build OS Image

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install NASM and GCC
        run: sudo apt-get update && sudo apt-get install -y nasm gcc-multilib

      - name: Compile bootloader
        run: nasm -f bin boot.asm -o boot.bin

      - name: Compile stage2 (第二扇区)
        run: nasm -f bin stage2.asm -o stage2.bin

      - name: Compile kernel modules
        run: |
          # 编译所有 .c 文件（保持目录结构）
          for file in kernel/*.c arch/x86/*.c lib/*.c fs/*.c; do
            gcc -m32 -ffreestanding -fno-pic -I. -c $file -o ${file%.c}.o
          done
          # 编译汇编文件
          nasm -f elf32 arch/x86/idt.asm -o arch/x86/idt_asm.o

      - name: Link kernel
        run: |
          # 收集所有 .o 文件
          OBJS=$(find kernel arch/x86 lib fs -name "*.o")
          ld -m elf_i386 -T kernel/linker.ld -nostdlib $OBJS -o kernel.bin

      - name: Create VHD image
        run: |
          dd if=/dev/zero of=os.vhd bs=1M count=10
          dd if=boot.bin of=os.vhd bs=512 count=1 conv=notrunc
          dd if=stage2.bin of=os.vhd bs=512 seek=1 conv=notrunc
          dd if=kernel.bin of=os.vhd bs=512 seek=2 conv=notrunc

      - name: Upload VHD artifact
        uses: actions/upload-artifact@v4
        with:
          name: os-image
          path: os.vhd
