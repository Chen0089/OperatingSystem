name: Build OS Image

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install NASM and GCC
        run: sudo apt-get update && sudo apt-get install -y nasm gcc-multilib

      - name: Compile bootloader
        run: nasm -f bin boot.asm -o boot.bin

      - name: Compile kernel main
        run: gcc -m32 -ffreestanding -fno-pic -c kernel.c -o kernel.o

      - name: Compile idt assembly
        run: nasm -f elf32 idt.asm -o idt_asm.o

      - name: Compile idt C code
        run: gcc -m32 -ffreestanding -fno-pic -c idt.c -o idt_c.o

      - name: Compile render module
        run: gcc -m32 -ffreestanding -fno-pic -c render.c -o render.o

      - name: Compile fs module
        run: gcc -m32 -ffreestanding -fno-pic -c fs.c -o fs.o

      - name: Compile print module
        run: gcc -m32 -ffreestanding -fno-pic -c print.c -o print.o

      - name: Compile string module
        run: gcc -m32 -ffreestanding -fno-pic -c string.c -o string.o

      - name: Link kernel
        run: |
          ld -m elf_i386 -T linker.ld -nostdlib \
            kernel.o idt_c.o idt_asm.o \
            render.o fs.o print.o string.o \
            -o kernel.bin

      - name: Create VHD image
        run: |
          dd if=/dev/zero of=os.vhd bs=1M count=10
          dd if=boot.bin of=os.vhd bs=512 count=1 conv=notrunc
          dd if=kernel.bin of=os.vhd bs=512 seek=1 conv=notrunc

      - name: Upload VHD artifact
        uses: actions/upload-artifact@v4
        with:
          name: os-image
          path: os.vhd
